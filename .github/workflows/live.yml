name: Live updater (loop en vivo)

# GitHub NO dispara los crons de forma fiable (ni frecuentes ni de baja frecuencia).
# Por eso este loop se RE-ENCADENA solo: al terminar cada ciclo dispara el siguiente
# vía la API (secret GH_PAT), sin depender del reloj de GitHub. Es el único updater
# automático (los workflows refresh/refresh-fast quedan solo manuales) -> sin choques
# de push. Marcadores cada 5 min; standings completo cada ~30 min. Activo 17-07 UTC.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "2 17 * * *"   # arranque diario de respaldo, por si la cadena se rompiera

permissions:
  contents: write

concurrency:
  group: pollas-live
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 280   # ~4.6 h; el loop sale limpio antes (no se "cancela" por timeout)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Loop de refresco (cada 5 min, ~4 h por ciclo)
        env:
          P26_EMAIL: ${{ secrets.P26_EMAIL }}
          P26_PASS: ${{ secrets.P26_PASS }}
          TRIPLEA_EMAIL: ${{ secrets.TRIPLEA_EMAIL }}
          TRIPLEA_PASS: ${{ secrets.TRIPLEA_PASS }}
          TRIPLEA3_EMAIL: ${{ secrets.TRIPLEA3_EMAIL }}
          TRIPLEA3_PASS: ${{ secrets.TRIPLEA3_PASS }}
          POLLAPATO_EMAIL: ${{ secrets.POLLAPATO_EMAIL }}
          POLLAPATO_PASS: ${{ secrets.POLLAPATO_PASS }}
        run: |
          git config user.name "pollas-bot"
          git config user.email "bot@users.noreply.github.com"
          for i in $(seq 1 50); do
            hour=$((10#$(date -u +%H)))   # 10# evita el bug de octal con 08/09
            # fuera de ventana de partidos (08-16 UTC = madrugada/mañana Panamá): en
            # reposo (no scrapea), pero el ciclo sigue vivo para no romper la cadena.
            if [ "$hour" -ge 8 ] && [ "$hour" -le 16 ]; then
              echo "== vuelta $i: fuera de ventana ($hour UTC), en reposo =="
            else
              # cada 6ta vuelta (~30 min) scrape completo (standings); el resto, sólo marcadores
              if [ $(( (i-1) % 6 )) -eq 0 ]; then
                echo "== vuelta $i: completo =="
                python scraper/scrape.py || true
              else
                echo "== vuelta $i: marcadores =="
                python scraper/scrape.py --results-only || true
              fi
              git add data/standings.json data/matches.json
              if ! git diff --staged --quiet; then
                git commit -m "live refresh $(date -u +%FT%TZ)"
                # push resiliente (reintenta ante cualquier choque; no aborta el loop)
                for k in 1 2 3 4 5; do
                  git pull --rebase origin main || true
                  git push && break || { echo "push falló (intento $k), reintento…"; sleep 3; }
                done
              else
                echo "sin cambios"
              fi
            fi
            if [ "$i" -lt 50 ]; then sleep 300; fi
          done

      - name: Re-encadenar el siguiente ciclo (si seguimos en ventana)
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "Sin secret GH_PAT: no me re-encadeno. Configúralo para 24/7 sin huecos."
            exit 0
          fi
          # Re-encadeno SIEMPRE (24/7): la cadena se auto-sostiene sin depender del cron.
          # En reposo de madrugada el ciclo no scrapea, pero la cadena no se rompe.
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_PAT" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/live.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "Re-encadenar siguiente ciclo -> HTTP $code"
