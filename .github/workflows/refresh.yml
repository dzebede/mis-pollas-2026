name: Refrescar standings (completo)

on:
  schedule:
    # Horario en UTC. Ventana de partidos ~19:00-07:00 UTC (14:00-02:00 Panamá).
    - cron: "*/10 19-23,0-6 * * *"   # standings de las pollas: cada 10 min en partidos
    - cron: "0 7-18/3 * * *"         # fuera de partidos: cada 3 h
  workflow_dispatch: {}   # botón "Run workflow" manual

permissions:
  contents: write   # para commitear data/standings.json

concurrency:
  # Grupo compartido con el workflow rápido para que NUNCA hagan push a la vez.
  group: pollas-commit
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Ejecutar scraper (completo)
        env:
          P26_EMAIL: ${{ secrets.P26_EMAIL }}
          P26_PASS: ${{ secrets.P26_PASS }}
          TRIPLEA_EMAIL: ${{ secrets.TRIPLEA_EMAIL }}
          TRIPLEA_PASS: ${{ secrets.TRIPLEA_PASS }}
          TRIPLEA3_EMAIL: ${{ secrets.TRIPLEA3_EMAIL }}
          TRIPLEA3_PASS: ${{ secrets.TRIPLEA3_PASS }}
          POLLAPATO_EMAIL: ${{ secrets.POLLAPATO_EMAIL }}
          POLLAPATO_PASS: ${{ secrets.POLLAPATO_PASS }}
        run: python scraper/scrape.py

      - name: Commitear standings si cambió
        run: |
          git config user.name "pollas-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/standings.json data/matches.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "refresh standings $(date -u +%FT%TZ)"
            git pull --rebase origin main || true
            git push
          fi
