name: Refrescar standings de las pollas

on:
  schedule:
    # cada 3 horas (UTC). Ajusta a gusto. Mundial: partidos ~17:00-04:00 UTC.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # botón "Run workflow" manual

permissions:
  contents: write   # para commitear data/standings.json

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Ejecutar scraper
        env:
          P26_EMAIL: ${{ secrets.P26_EMAIL }}
          P26_PASS: ${{ secrets.P26_PASS }}
          TRIPLEA_EMAIL: ${{ secrets.TRIPLEA_EMAIL }}
          TRIPLEA_PASS: ${{ secrets.TRIPLEA_PASS }}
          POLLAPATO_EMAIL: ${{ secrets.POLLAPATO_EMAIL }}
          POLLAPATO_PASS: ${{ secrets.POLLAPATO_PASS }}
        run: python scraper/scrape.py

      - name: Commitear standings si cambió
        run: |
          git config user.name "pollas-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/standings.json
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "refresh standings $(date -u +%FT%TZ)"
            git push
          fi
